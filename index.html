<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Comp — Gank &amp; Brawl</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #7a7f8e;
    --accent: #c8a84b;

    --healer: #22c55e;
    --healer-bg: rgba(34,197,94,0.12);
    --support: #eab308;
    --support-bg: rgba(234,179,8,0.12);
    --dps: #ef4444;
    --dps-bg: rgba(239,68,68,0.12);
    --tank: #3b82f6;
    --tank-bg: rgba(59,130,246,0.12);
    --gank: #a855f7;
    --gank-bg: rgba(168,85,247,0.12);
  }

  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  .site-header { border-bottom: 1px solid var(--border); padding: 28px 40px 24px; display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  /* #4 — guild mark glow */
  .guild-mark { width: 46px; height: 46px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 20px rgba(200,168,75,0.28); }
  .guild-mark svg { width: 24px; height: 24px; fill: #0e0f11; }
  .header-text h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  /* #8 — header meta as pills */
  .header-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .meta-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border2); border-radius: 999px; padding: 2px 8px; }
  .meta-pill svg { width: 10px; height: 10px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* #11 — copy button accent hover */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); transition: background 0.15s, border-color 0.15s; text-decoration: none; font-family: inherit; }
  .btn:hover { background: #2a2d35; border-color: var(--accent); color: var(--accent); }
  .btn:hover svg { stroke: var(--accent); }

  /* #1 — legend bar removed (no styles needed) */

  .controls { display: flex; gap: 10px; align-items: center; padding: 14px 40px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
  .search-wrap input { width: 100%; padding: 7px 10px 7px 30px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* #10 — filter dots on inactive buttons */
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.12s; }
  .filter-btn .fb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; opacity: 0.5; transition: opacity 0.12s; }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .filter-btn:hover .fb-dot { opacity: 0.8; }
  .filter-btn.active { color: var(--text); border-color: rgba(255,255,255,0.3); background: var(--surface2); }
  .filter-btn.active .fb-dot { opacity: 1; }
  .filter-btn[data-role="healer"].active { border-color: var(--healer); color: var(--healer); background: var(--healer-bg); }
  .filter-btn[data-role="support"].active { border-color: var(--support); color: var(--support); background: var(--support-bg); }
  .filter-btn[data-role="dps"].active { border-color: var(--dps); color: var(--dps); background: var(--dps-bg); }
  .filter-btn[data-role="tank"].active { border-color: var(--tank); color: var(--tank); background: var(--tank-bg); }
  .filter-btn[data-role="gank"].active { border-color: var(--gank); color: var(--gank); background: var(--gank-bg); }
  .count-label { margin-left: auto; font-size: 12px; color: var(--muted); }

  .table-wrap { overflow-x: auto; padding: 0 40px 40px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 10px; font-size: 11px; font-weight: 500; color: var(--muted); text-align: left; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  /* #7 — column group separator before consumables */
  thead th.col-sep, td.col-sep { border-left: 1px solid var(--border2); }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 7px 10px; vertical-align: middle; }

  /* #2 — top-3 priority colours */
  .prio-num { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; color: var(--muted); min-width: 24px; display: block; text-align: center; }
  .prio-num[data-rank="1"] { color: #c8a84b; }
  .prio-num[data-rank="2"] { color: #9ca3af; }
  .prio-num[data-rank="3"] { color: #b45309; }
  tr:hover .prio-num { color: var(--accent); }

  .role-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .role-pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .role-healer { color: var(--healer); background: var(--healer-bg); }
  .role-support { color: var(--support); background: var(--support-bg); }
  .role-dps { color: var(--dps); background: var(--dps-bg); }
  .role-tank { color: var(--tank); background: var(--tank-bg); }
  .role-gank { color: var(--gank); background: var(--gank-bg); }

  /* row left-border accent by role */
  tr[data-role="healer"] td:first-child { border-left: 2px solid var(--healer); }
  tr[data-role="support"] td:first-child { border-left: 2px solid var(--support); }
  tr[data-role="dps"] td:first-child { border-left: 2px solid var(--dps); }
  tr[data-role="tank"] td:first-child { border-left: 2px solid var(--tank); }
  tr[data-role="gank"] td:first-child { border-left: 2px solid var(--gank); }

  /* #3 — faint per-role row tinting */
  tr[data-role="healer"] { background: rgba(34,197,94,0.03); }
  tr[data-role="support"] { background: rgba(234,179,8,0.03); }
  tr[data-role="dps"]     { background: rgba(239,68,68,0.03); }
  tr[data-role="tank"]    { background: rgba(59,130,246,0.03); }
  tr[data-role="gank"]    { background: rgba(168,85,247,0.03); }
  tbody tr:hover { background: var(--surface2) !important; }

  /* #9 — icon hover brightness */
  .item-cell img:hover { filter: brightness(1.2); transition: filter 0.12s; }

  .item-cell { display: flex; align-items: center; gap: 7px; }
  .item-icon { width: 30px; height: 30px; border-radius: 5px; border: 1px solid var(--border2); background: var(--surface2); object-fit: contain; flex-shrink: 0; }
  .item-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  /* #6 — consumable labels readable size/color */
  .food-tag { font-size: 12px; color: rgba(232,234,240,0.8); white-space: nowrap; }
  .note-tag { font-size: 11px; color: var(--support); font-style: italic; white-space: nowrap; }

  /* #5 — tooltip with role-coloured top border */
  #tooltip { position: fixed; z-index: 9999; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 0; pointer-events: none; display: none; min-width: 240px; max-width: 300px; overflow: hidden; }
  #tooltip.show { display: block; }
  .tt-role-bar { height: 3px; width: 100%; }
  .tt-body { padding: 14px 16px; }
  .tt-head { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .tt-prio { font-size: 11px; background: var(--surface2); border: 1px solid var(--border2); padding: 2px 7px; border-radius: 999px; color: var(--muted); font-family: 'Inter', sans-serif; font-weight: 500; }
  .tt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; } .tt-empty { min-height: 52px; }
  .tt-slot { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .tt-icon { width: 48px; height: 48px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface2); object-fit: contain; }
  .tt-slot-label { font-size: 10px; color: var(--muted); line-height: 1.2; }
  .tt-slot-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .tt-note { margin-top: 10px; padding: 6px 8px; background: var(--surface2); border-radius: 6px; font-size: 11px; color: var(--support); font-style: italic; }

  /* compact view: hide all gear/consumable columns */
  th.col-hide, td.col-hide { display: none; }
  /* stretch the weapon column to fill remaining space */
  table th:nth-child(3), table td:nth-child(3) { width: 100%; }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 18px; font-size: 13px; color: var(--text); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 9999; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .site-footer { border-top: 1px solid var(--border); padding: 16px 40px; font-size: 11px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .site-footer a { color: var(--muted); text-decoration: none; }
  .site-footer a:hover { color: var(--text); }

  @media (max-width: 640px) {
    .site-header, .legend-bar, .controls, .table-wrap, .site-footer { padding-left: 16px; padding-right: 16px; }
    .header-actions { width: 100%; margin-left: 0; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>

  { prio:16, role:"dps", weapon:"Lightcaller",       offhand:"",                 head:"Feyscale Hat",     chest:"Royal Armor",       feet:"Stalker Boots",  cape:"Smuggler Cape",  food:"Beef stew", potion:"Major Gigantify", note:"" },
  { prio:17, role:"tank", weapon:"Staff of Balance",  offhand:"",                 head:"Hellion Hood",     chest:"Guardian Armor",    feet:"Feyscale Sandals",cape:"Bridgewatch Cape", food:"Avalonian Omelette", potion:"Major Gigantify",   note:"" },
  { prio:18, role:"support", weapon:"Oathkeepers",       offhand:"",                 head:"Assassin Hood",    chest:"Demon Armor",      feet:"Stalker Boots",  cape:"Smuggler Cape",  food:"Avalonian Omelette", potion:"Major Gigantify",   note:"" },
  { prio:19, role:"tank", weapon:"Grailseeker",       offhand:"",                 head:"Hellion Hood",     chest:"Judicator Armor",   feet:"Hunter Shoes",   cape:"Smuggler Cape",  food:"Avalonian Omelette", potion:"Major Gigantify",   note:"" },
  { prio:20, role:"healer", weapon:"1H Nature Staff",   offhand:"Blueflame Torch",  head:"Assassin Hood",    chest:"Royal Armor",       feet:"Stalker Boots",  cape:"Lymhurst Cape",    food:"Avalonian Omelette", potion:"Major Gigantify",   note:"" },
];

function imgUrl(name) {
  const id = ITEM_MAP[name];
  if (!id) return null;
  return `https://render.albiononline.com/v1/item/${id}.png?quality=1`;
}

function iconImg(name, size) {
  const url = imgUrl(name);
  if (!url) return `<div style="width:${size}px;height:${size}px;border-radius:5px;background:var(--surface2);border:1px solid var(--border2)"></div>`;
  return `<img src="${url}" width="${size}" height="${size}" style="border-radius:5px;border:1px solid var(--border2);background:var(--surface2);object-fit:contain" alt="${name}" onerror="this.style.opacity='0.15'">`;
}

function itemCellHTML(name, hidden) {
  const cls = hidden ? ' class="col-hide"' : '';
  if (!name) return `<td${cls}><span style="color:var(--muted);padding:0 10px">—</span></td>`;
  return `<td${cls}><div class="item-cell">${iconImg(name,30)}<span class="item-name" title="${name}">${name}</span></div></td>`;
}

function renderRows(builds) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const countLabel = document.getElementById('count-label');
  if (!builds.length) { tbody.innerHTML=''; empty.style.display=''; countLabel.textContent='0 builds'; return; }
  empty.style.display='none';
  countLabel.textContent = `${builds.length} build${builds.length!==1?'s':''}`;
  tbody.innerHTML = builds.map(b => `
    <tr data-prio="${b.prio}" data-role="${b.role}">
      <td><span class="prio-num" data-rank="${b.prio <= 3 ? b.prio : ''}">${b.prio}</span></td>
      <td><span class="role-pill role-${b.role}"><span class="role-pill-dot" style="background:${ROLE_COLORS[b.role]}"></span>${ROLE_LABELS[b.role]}</span></td>
      ${itemCellHTML(b.weapon)}
      ${itemCellHTML(b.offhand, true)}
      ${itemCellHTML(b.head, true)}
      ${itemCellHTML(b.chest, true)}
      ${itemCellHTML(b.feet, true)}
      ${itemCellHTML(b.cape, true)}
      <td class="col-hide col-sep"><div class="item-cell">${iconImg(b.potion,30)}<span class="food-tag" title="${b.potion}">${b.potion}</span></div></td>
      <td class="col-hide"><div class="item-cell">${iconImg(b.food,30)}<span class="food-tag" title="${b.food}">${b.food}</span></div></td>
    </tr>`).join('');
  tbody.querySelectorAll('tr').forEach(row => {
    row.addEventListener('mouseenter', e => showTT(e, parseInt(row.dataset.prio)));
    row.addEventListener('mousemove', moveTT);
    row.addEventListener('mouseleave', hideTT);
  });
}

const tt = document.getElementById('tooltip');
function showTT(e, prio) {
  const b = BUILDS.find(x => x.prio===prio); if(!b) return;
  const grid = [
    { label: "",        name: ""         },
    { label: "Head",    name: b.head     },
    { label: "Cape",    name: b.cape     },
    { label: "Weapon",  name: b.weapon   },
    { label: "Chest",   name: b.chest    },
    { label: "Offhand", name: b.offhand  },
    { label: "Potion",  name: b.potion   },
    { label: "Feet",    name: b.feet     },
    { label: "Food",    name: b.food     },
  ];
  tt.innerHTML = `
    <div class="tt-role-bar" style="background:${ROLE_COLORS[b.role]}"></div>
    <div class="tt-body">
      <div class="tt-head">${b.weapon}<span class="tt-prio">#${b.prio}</span></div>
      <div class="tt-grid">
        ${grid.map(s => s.name
          ? `<div class="tt-slot">${iconImg(s.name,52)}<span class="tt-slot-label">${s.label}</span><span class="tt-slot-name">${s.name}</span></div>`
          : `<div class="tt-slot tt-empty"></div>`
        ).join('')}
      </div>${b.note ? `<div class="tt-note">${b.note}</div>` : ''}
    </div>`;
  tt.classList.add('show'); placeTT(e);
}
function moveTT(e) { placeTT(e); }
function placeTT(e) {
  const w=tt.offsetWidth||260, h=tt.offsetHeight||200;
  let x=e.clientX+18, y=e.clientY+18;
  if(x+w>window.innerWidth-8) x=e.clientX-w-18;
  if(y+h>window.innerHeight-8) y=e.clientY-h-18;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}
function hideTT() { tt.classList.remove('show'); }

let activeRole='all', searchStr='';
function applyFilters() {
  const filtered = BUILDS.filter(b => {
    const roleOk = activeRole==='all' || b.role===activeRole;
    const q = searchStr.toLowerCase();
    const searchOk = !q || [b.weapon,b.offhand,b.head,b.chest,b.feet,b.cape,b.note].some(v=>v&&v.toLowerCase().includes(q));
    return roleOk && searchOk;
  });
  renderRows(filtered);
}

document.getElementById('search').addEventListener('input', e => { searchStr=e.target.value; applyFilters(); });
document.getElementById('filter-group').addEventListener('click', e => {
  const btn=e.target.closest('.filter-btn'); if(!btn) return;
  activeRole=btn.dataset.role;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===btn));
  applyFilters();
});

const toast=document.getElementById('toast'); let toastTimer;
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(window.location.href).then(()=>{
    toast.textContent='✓ Link copied — paste it in Discord';
    toast.classList.add('show'); clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
  });
});

renderRows(BUILDS);
</script>
</body>
</html>
